name: Release

# Push a v* tag (scripts/cut-release.sh) → two parallel macos-15 jobs build,
# sign, notarize, and publish per-arch DMGs (arm64 + Intel x64), upload the
# per-arch Sparkle appcasts to R2, and attach everything to a GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (v*). Defaults to the current tag ref."
        required: false
      dry_run:
        description: "Prepare and verify without publishing to R2 or GitHub."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  SPARKLE_PUBLIC_BASE_URL: https://updates.agentic30.app/
  SPARKLE_DOWNLOAD_URL_PREFIX: https://updates.agentic30.app/
  SPARKLE_R2_BUCKET: agentic30-sparkle
  SPARKLE_UPDATE_DOMAIN: updates.agentic30.app
  SPARKLE_WRANGLER_BIN: wrangler
  SPARKLE_WRANGLER_REMOTE: "1"
  CLOUDFLARE_ACCOUNT_ID: 3c03f4b8151b812cd2662d4fb9d30b1f

jobs:
  release:
    name: Build, notarize, and publish (${{ matrix.bundle_arch }})
    runs-on: macos-15
    # Build takes ~15 min; each notarytool submit is capped at 2h. Cap the job
    # so a hung Apple notary connection fails fast instead of burning the
    # default 6h runner timeout (observed 2026-06-10: DMG submit hung 5h46m).
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          # arm64 keeps the historical appcast.xml so existing Apple Silicon
          # installs continue updating; Intel builds get their own feed so
          # Sparkle never hands an Intel Mac an arm64 DMG.
          - bundle_arch: arm64
            appcast_filename: appcast.xml
          - bundle_arch: x64
            appcast_filename: appcast-x64.xml
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
      DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_RELEASE_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
      AGENTIC30_UPLOAD_APPCAST_R2: ${{ github.event.inputs.dry_run == 'true' && '0' || '1' }}
      AGENTIC30_BUNDLE_ARCH: ${{ matrix.bundle_arch }}
      SPARKLE_APPCAST_FILENAME: ${{ matrix.appcast_filename }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
      DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
    steps:
      - name: Validate release tag
        run: |
          case "$RELEASE_TAG" in
            v*) echo "Releasing $RELEASE_TAG (${AGENTIC30_BUNDLE_ARCH})" ;;
            *) echo "ERROR: RELEASE_TAG must look like v* (got: '$RELEASE_TAG'); pass release_tag when dispatching from a branch" >&2; exit 2 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/asc/AuthKey.p8"
          echo "ASC_API_KEY_PATH=$RUNNER_TEMP/asc/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Import Developer ID signing identity
        run: bash scripts/import-apple-signing-ci.sh

      - name: Arm Sparkle version guard from live feed
        run: |
          set -euo pipefail
          prev="$(curl -fsSL "${SPARKLE_PUBLIC_BASE_URL}${SPARKLE_APPCAST_FILENAME}" 2>/dev/null \
            | grep -oE '<sparkle:version>[0-9]+' | grep -oE '[0-9]+' | sort -n | tail -1 || true)"
          echo "PREVIOUS_BUNDLE_VERSION=${prev}" >> "$GITHUB_ENV"
          echo "Live Sparkle build version: ${prev:-none}; this build must be strictly greater."

      - name: Build, notarize, generate appcast, and upload R2
        run: bash scripts/build-and-notarize.sh

      - name: Publish GitHub Release
        run: npm run release:publish:github
